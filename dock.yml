opendock: 1
summary: Codex skill and Playwright harness for converting UI images into high-fidelity HTML.
readme: DOCK.md
logo: logo.png
tags:
  - codex
  - image-to-html
  - html
  - visual-regression
  - playwright

requires:
  runtimes:
    node: ">=20.0.0"
    npm: ">=10.0.0"

files:
  - from: SKILL.md
    to: .codex/skills/image2html/SKILL.md
  - from: references
    to: .codex/skills/image2html/references
  - from: scripts
    to: .codex/skills/image2html/scripts
  - from: assets/templates
    to: .codex/skills/image2html/assets/templates
  - from: package.json
    to: .codex/skills/image2html/package.json
  - from: package-lock.json
    to: .codex/skills/image2html/package-lock.json

doctor:
  - id: codex-skill
    check: test -f .codex/skills/image2html/SKILL.md
  - id: analysis-schema
    check: test -f .codex/skills/image2html/references/analysis-schema.md
  - id: harness-script
    check: test -f .codex/skills/image2html/scripts/run-harness.mjs
  - id: site-harness-script
    check: test -f .codex/skills/image2html/scripts/run-site-harness.mjs
  - id: harness-package
    check: test -f .codex/skills/image2html/package.json
