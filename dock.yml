opendock: 1
summary: Codex skill and Playwright harness for converting UI images into high-fidelity HTML.
readme: DOCK.md
logo: logo.png
tags:
  - codex
  - image-to-html
  - html
  - visual-regression
  - playwright

permissions:
  - image2html-harness --help
  - image2html-site-harness --help

requires:
  runtimes:
    node: ">=20.0.0"
    npm: ">=10.0.0"

tools:
  image2html:
    manager: npm
    package: "@yaklede/image2html"
    version: "1.0.0"
    commands:
      - image2html-harness
      - image2html-site-harness
      - image2html-normalize
      - image2html-render
      - image2html-compare
      - image2html-a11y
      - image2html-inspect
      - image2html-responsive

files:
  - from: SKILL.md
    to: .codex/skills/image2html/SKILL.md
  - from: references
    to: .codex/skills/image2html/references
  - from: scripts
    to: .codex/skills/image2html/scripts
  - from: assets/templates
    to: .codex/skills/image2html/assets/templates

doctor:
  - id: node-runtime
    run: node --version
    version: ">=20.0.0"
  - id: npm-runtime
    run: npm --version
    version: ">=10.0.0"
  - id: codex-skill
    check: test -f .codex/skills/image2html/SKILL.md
  - id: analysis-schema
    check: test -f .codex/skills/image2html/references/analysis-schema.md
  - id: harness-script
    check: test -f .codex/skills/image2html/scripts/run-harness.mjs
  - id: site-harness-script
    check: test -f .codex/skills/image2html/scripts/run-site-harness.mjs
  - id: image2html-harness-tool
    run: image2html-harness --help
  - id: image2html-site-harness-tool
    run: image2html-site-harness --help
